name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v0.1.1
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_NAME: ${{ format('spring-correctness-linter {0}', github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name) }}
      RELEASE_PRERELEASE: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-') }}
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release configuration
        shell: bash
        run: |
          test -n "${MAVEN_CENTRAL_USERNAME}" || { echo "Missing secret: MAVEN_CENTRAL_USERNAME"; exit 1; }
          test -n "${MAVEN_CENTRAL_PASSWORD}" || { echo "Missing secret: MAVEN_CENTRAL_PASSWORD"; exit 1; }
          test -n "${MAVEN_GPG_PRIVATE_KEY}" || { echo "Missing secret: MAVEN_GPG_PRIVATE_KEY"; exit 1; }
          test -n "${MAVEN_GPG_PASSPHRASE}" || { echo "Missing secret: MAVEN_GPG_PASSPHRASE"; exit 1; }
          git rev-parse --verify "refs/tags/${RELEASE_TAG}"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ env.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify project
        run: mvn -B -q verify

      - name: Publish to Maven Central
        run: mvn -B -q -Pcentral-publish -DskipTests -Dcentral.publish.auto=true -Dcentral.publish.waitUntil=published deploy

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp linter-core/target/*.jar release-artifacts/ || true
          cp linter-core/target/*.pom release-artifacts/ || true
          cp linter-core/target/*.asc release-artifacts/ || true
          cp linter-maven-plugin/target/*.jar release-artifacts/ || true
          cp linter-maven-plugin/target/*.pom release-artifacts/ || true
          cp linter-maven-plugin/target/*.asc release-artifacts/ || true

      - name: Generate release notes draft
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_NAME: ${{ env.RELEASE_NAME }}
          RELEASE_PRERELEASE: ${{ env.RELEASE_PRERELEASE }}
        run: |
          NOTES_FILE="RELEASE_NOTES_${RELEASE_TAG}.md"
          if [[ -f "$NOTES_FILE" ]]; then
            cp "$NOTES_FILE" RELEASE_NOTES.md
            echo "Using versioned release notes from $NOTES_FILE"
          else
            cp RELEASE_NOTES_TEMPLATE.md RELEASE_NOTES.md
            python3 -c "from pathlib import Path; import os; path = Path('RELEASE_NOTES.md'); lines = path.read_text(encoding='utf-8').splitlines(); lines[0] = f\"# {os.environ['RELEASE_NAME']}\" if lines else f\"# {os.environ['RELEASE_NAME']}\"; lines.extend(['', '> Drafted automatically from `RELEASE_NOTES_TEMPLATE.md`.', f\"> Tag: `{os.environ['RELEASE_TAG']}`\", f\"> Prerelease: `{os.environ['RELEASE_PRERELEASE']}`\"]); path.write_text('\n'.join(lines) + '\n', encoding='utf-8')"
            echo "Using templated release notes for ${RELEASE_TAG}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          body_path: RELEASE_NOTES.md
          files: release-artifacts/*
