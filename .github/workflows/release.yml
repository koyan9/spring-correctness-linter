name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v0.1.1
        required: true
        type: string
      release_name:
        description: Display name for the release
        required: true
        type: string
      prerelease:
        description: Mark the release as prerelease
        required: true
        default: true
        type: boolean

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify project
        run: mvn -B -q verify

      - name: Build release artifacts
        run: mvn -B -q -Prelease-artifacts package

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp linter-core/target/*.jar release-artifacts/ || true
          cp linter-maven-plugin/target/*.jar release-artifacts/ || true

      - name: Generate release notes draft
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          NOTES_FILE="RELEASE_NOTES_${RELEASE_TAG}.md"
          if [[ -f "$NOTES_FILE" ]]; then
            cp "$NOTES_FILE" RELEASE_NOTES.md
            echo "Using versioned release notes from $NOTES_FILE"
          else
            cp RELEASE_NOTES_TEMPLATE.md RELEASE_NOTES.md
            python - <<'PY'
from pathlib import Path
import os

path = Path("RELEASE_NOTES.md")
lines = path.read_text(encoding="utf-8").splitlines()
if lines:
    lines[0] = f"# {os.environ['RELEASE_NAME']}"

lines.extend([
    "",
    "> Drafted automatically from `RELEASE_NOTES_TEMPLATE.md`.",
    f"> Tag: `{os.environ['RELEASE_TAG']}`",
    f"> Prerelease: `{os.environ['RELEASE_PRERELEASE']}`",
])

path.write_text("\n".join(lines) + "\n", encoding="utf-8")
PY
            echo "Using templated release notes for ${RELEASE_TAG}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          body_path: RELEASE_NOTES.md
          files: release-artifacts/*
