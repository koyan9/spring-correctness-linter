name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v0.1.1
        required: true
        type: string
      release_name:
        description: Display name for the release
        required: true
        type: string
      prerelease:
        description: Mark the release as prerelease
        required: true
        default: false
        type: boolean

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Validate release configuration
        shell: bash
        run: |
          test -n "${MAVEN_CENTRAL_USERNAME}" || { echo "Missing secret: MAVEN_CENTRAL_USERNAME"; exit 1; }
          test -n "${MAVEN_CENTRAL_PASSWORD}" || { echo "Missing secret: MAVEN_CENTRAL_PASSWORD"; exit 1; }
          test -n "${MAVEN_GPG_PRIVATE_KEY}" || { echo "Missing secret: MAVEN_GPG_PRIVATE_KEY"; exit 1; }
          test -n "${MAVEN_GPG_PASSPHRASE}" || { echo "Missing secret: MAVEN_GPG_PASSPHRASE"; exit 1; }
          git rev-parse --verify "refs/tags/${{ inputs.tag }}"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ env.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Verify project
        run: mvn -B -q verify

      - name: Publish to Maven Central
        run: mvn -B -q -Pcentral-publish -DskipTests -Dcentral.publish.auto=true -Dcentral.publish.waitUntil=published deploy

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp linter-core/target/*.jar release-artifacts/ || true
          cp linter-core/target/*.pom release-artifacts/ || true
          cp linter-core/target/*.asc release-artifacts/ || true
          cp linter-maven-plugin/target/*.jar release-artifacts/ || true
          cp linter-maven-plugin/target/*.pom release-artifacts/ || true
          cp linter-maven-plugin/target/*.asc release-artifacts/ || true

      - name: Generate release notes draft
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          NOTES_FILE="RELEASE_NOTES_${RELEASE_TAG}.md"
          if [[ -f "$NOTES_FILE" ]]; then
            cp "$NOTES_FILE" RELEASE_NOTES.md
            echo "Using versioned release notes from $NOTES_FILE"
          else
            cp RELEASE_NOTES_TEMPLATE.md RELEASE_NOTES.md
            python - <<'PY'
            from pathlib import Path
            import os

            path = Path("RELEASE_NOTES.md")
            lines = path.read_text(encoding="utf-8").splitlines()
            if lines:
                lines[0] = f"# {os.environ['RELEASE_NAME']}"

            lines.extend([
                "",
                "> Drafted automatically from `RELEASE_NOTES_TEMPLATE.md`.",
                f"> Tag: `{os.environ['RELEASE_TAG']}`",
                f"> Prerelease: `{os.environ['RELEASE_PRERELEASE']}`",
            ])

            path.write_text("\n".join(lines) + "\n", encoding="utf-8")
            PY
            echo "Using templated release notes for ${RELEASE_TAG}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          body_path: RELEASE_NOTES.md
          files: release-artifacts/*
